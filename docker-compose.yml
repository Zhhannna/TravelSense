version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: travelsense
      POSTGRES_PASSWORD: travelsense
      POSTGRES_DB: travelsense
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelsense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://travelsense:travelsense@db:5432/travelsense
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      AIRQUALITY_API_KEY: ${AIRQUALITY_API_KEY:-}
      CURRENCY_API_KEY: ${CURRENCY_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
